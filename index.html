<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monika | AI 語音助理 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F1F5F9; }
        .drag-over { border-color: #0EA5E9 !important; background-color: #F0F9FF !important; transform: scale(1.02); box-shadow: 0 0 30px rgba(14, 165, 233, 0.4); }
        .loading-shimmer {
            background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .transcript-container::-webkit-scrollbar { width: 6px; }
        .transcript-container::-webkit-scrollbar-thumb { background-color: #CBD5E1; border-radius: 10px; }
        .debug-console { background: #0F172A; color: #38BDF8; font-family: monospace; font-size: 11px; padding: 15px; border-radius: 12px; margin-top: 15px; max-height: 250px; overflow-y: auto; border: 1px solid #1E293B; line-height: 1.6; }
        details summary::-webkit-details-marker { display: none; }
        .hashtag-pill { background-color: #E0F2FE; color: #0369A1; padding: 4px 14px; border-radius: 99px; font-size: 14px; font-weight: 700; margin-right: 8px; margin-bottom: 8px; display: inline-block; border: 1px solid #BAE6FD; transition: all 0.2s; }
        .hashtag-pill:hover { background-color: #BAE6FD; transform: translateY(-1px); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-[#0F172A] text-white py-6 shadow-lg border-b-4 border-sky-500">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 bg-sky-500 rounded-2xl flex items-center justify-center shadow-lg transform rotate-3">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">AI 語音助理 <span class="text-sky-400 font-light">Pro</span></h1>
                    <p class="text-xs text-slate-400 tracking-widest uppercase font-bold">Ultimate Victory v4.9</p>
                </div>
            </div>
            <button id="settingsBtn" class="p-2 hover:bg-slate-700 rounded-full transition-all text-slate-300 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-10 max-w-5xl">
        <!-- Settings -->
        <div id="settingsOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-6">
            <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl border border-slate-100">
                <h3 class="text-xl font-bold mb-4 text-slate-800 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-sky-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                    API 設定
                </h3>
                <input type="password" id="apiKeyInput" placeholder="貼上 API Key..." class="w-full px-4 py-3 border border-slate-200 rounded-xl mb-6 outline-none focus:ring-2 focus:ring-sky-500 shadow-inner">
                <div class="flex space-x-3">
                    <button id="saveKeyBtn" class="flex-1 bg-sky-600 text-white py-3 rounded-xl font-bold hover:bg-sky-700 active:scale-95 transition-all">儲存</button>
                    <button id="closeSettingsBtn" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition-all">關閉</button>
                </div>
            </div>
        </div>

        <!-- Upload -->
        <section id="dropZone" class="bg-white border-4 border-dashed border-slate-200 rounded-[2.5rem] p-16 text-center cursor-pointer hover:border-sky-500 hover:bg-sky-50/40 transition-all group shadow-sm relative overflow-hidden">
            <input type="file" id="audioInput" class="hidden" accept="audio/*">
            <div class="flex flex-col items-center pointer-events-none relative z-10">
                <div class="w-20 h-20 bg-slate-50 text-slate-400 rounded-3xl flex items-center justify-center mb-6 group-hover:bg-white group-hover:text-sky-500 shadow-sm transition-all transform group-hover:rotate-12 group-hover:scale-110">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-700 tracking-tight">點擊選擇或直接拖放錄音檔</h2>
                <p class="text-slate-400 mt-2 font-medium text-lg">支持正式長會議錄音 (最高 2GB)</p>
                <div id="fileInfo" class="hidden mt-6 flex flex-col items-center">
                    <span id="fileNameDisplay" class="px-6 py-3 bg-sky-100 text-sky-700 rounded-full text-sm font-bold shadow-sm animate-pulse border border-sky-200"></span>
                </div>
            </div>
        </section>

        <div class="mt-10 flex flex-col items-center">
            <button id="transcribeBtn" disabled class="bg-sky-600 text-white px-12 py-5 rounded-[1.25rem] font-bold text-lg disabled:bg-slate-300 shadow-xl shadow-sky-200 hover:bg-sky-700 transition-all active:scale-95 flex items-center group">
                <svg class="w-5 h-5 mr-3 group-hover:animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                啟動 AI 秘書產出報告
            </button>
            <div id="statusLabel" class="mt-6 text-sky-600 font-bold animate-pulse hidden">秘書準備中...</div>
        </div>

        <!-- Results -->
        <div id="resultSection" class="mt-16 hidden space-y-10">
            <div class="flex justify-between items-end border-b-2 border-slate-200 pb-4">
                <div>
                    <h2 class="text-3xl font-bold text-slate-800 tracking-tight">轉換成果</h2>
                    <p class="text-slate-400 text-sm mt-1">AI 秘書已為您精煉會議內容</p>
                </div>
                <button id="exportBtn" class="bg-emerald-600 text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-lg hover:bg-emerald-700 transition-all transform hover:-translate-y-1 flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 1 0 01-2 2z"></path></svg>
                    匯出 Word 文件
                </button>
            </div>

            <div class="grid gap-8">
                <section class="bg-amber-50 p-10 rounded-[2.5rem] border border-amber-200/50 shadow-sm relative">
                    <h3 class="font-bold text-amber-800 text-xl mb-6 flex items-center">
                        <span class="w-2 h-6 bg-amber-400 rounded-full mr-3"></span>
                        重點摘要與行動清單
                    </h3>
                    <div id="summaryContent" class="text-amber-900/80 leading-relaxed whitespace-pre-wrap text-lg mb-8"></div>
                    <div id="hashtagContainer" class="flex flex-wrap border-t border-amber-200/40 pt-6"></div>
                </section>

                <section class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm">
                    <h3 class="font-bold text-slate-800 text-xl mb-6 flex items-center border-b border-slate-100 pb-4">
                        <span class="w-2 h-6 bg-sky-500 rounded-full mr-3"></span>
                        會議完整逐字稿
                    </h3>
                    <div id="transcriptContainer" class="transcript-container max-h-[600px] overflow-y-auto text-slate-600 whitespace-pre-wrap leading-loose text-lg pr-4"></div>
                </section>
            </div>
        </div>

        <!-- Debug Console -->
        <div id="debugArea" class="mt-16 pt-8 border-t border-slate-200">
            <details class="group">
                <summary class="flex justify-between items-center cursor-pointer">
                    <div class="flex items-center space-x-3">
                        <span class="text-xs text-slate-400 font-bold tracking-widest uppercase">除錯終端 (DEBUG)</span>
                        <div class="flex space-x-2 opacity-0 group-open:opacity-100 transition-opacity">
                            <button id="checkModelsBtn" class="text-[10px] bg-sky-100 text-sky-600 px-3 py-1.5 rounded-lg hover:bg-sky-200 font-bold">🔍 掃描可用大腦</button>
                            <button id="copyLogBtn" class="text-[10px] bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg hover:bg-slate-300 font-bold">📋 複製日誌</button>
                        </div>
                    </div>
                    <span class="text-slate-300 group-open:rotate-180 transition-transform text-lg">▼</span>
                </summary>
                <div id="debugConsole" class="debug-console">等待 Monika 下達指令...</div>
            </details>
        </div>
    </main>

    <script>
        let CURRENT_MODEL = localStorage.getItem('last_successful_model') || "gemini-1.5-flash"; 
        const API_VERSION = "v1beta";
        const BASE_URL = "https://generativelanguage.googleapis.com";

        const elements = {
            settingsBtn: document.getElementById('settingsBtn'),
            settingsOverlay: document.getElementById('settingsOverlay'),
            apiKeyInput: document.getElementById('apiKeyInput'),
            saveKeyBtn: document.getElementById('saveKeyBtn'),
            closeSettingsBtn: document.getElementById('closeSettingsBtn'),
            audioInput: document.getElementById('audioInput'),
            transcribeBtn: document.getElementById('transcribeBtn'),
            fileNameDisplay: document.getElementById('fileNameDisplay'),
            statusLabel: document.getElementById('statusLabel'),
            resultSection: document.getElementById('resultSection'),
            summaryContent: document.getElementById('summaryContent'),
            hashtagContainer: document.getElementById('hashtagContainer'),
            transcriptContainer: document.getElementById('transcriptContainer'),
            debugConsole: document.getElementById('debugConsole'),
            copyLogBtn: document.getElementById('copyLogBtn'),
            exportBtn: document.getElementById('exportBtn'),
            dropZone: document.getElementById('dropZone'),
            checkModelsBtn: document.getElementById('checkModelsBtn'),
            fileInfo: document.getElementById('fileInfo')
        };

        let selectedFile = null;
        let generatedData = { summary: "", hashtags: [], transcript: "" };

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            elements.debugConsole.innerHTML += `<div>[${time}] ${msg}</div>`;
            elements.debugConsole.scrollTop = elements.debugConsole.scrollHeight;
        }

        // --- 修復複製功能：極致相容版 ---
        elements.copyLogBtn.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            const text = elements.debugConsole.innerText;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                log("✅ 日誌已成功複製！");
            } catch (err) {
                log("❌ 複製失敗。");
            }
            document.body.removeChild(textArea);
        };

        // --- 拖放功能核心 ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            elements.dropZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
        });
        elements.dropZone.addEventListener('dragenter', () => elements.dropZone.classList.add('drag-over'));
        elements.dropZone.addEventListener('dragover', () => elements.dropZone.classList.add('drag-over'));
        elements.dropZone.addEventListener('dragleave', () => elements.dropZone.classList.remove('drag-over'));
        elements.dropZone.addEventListener('drop', (e) => {
            elements.dropZone.classList.remove('drag-over');
            handleFileSelection(e.dataTransfer.files[0]);
        });
        elements.dropZone.onclick = () => elements.audioInput.click();
        elements.audioInput.onchange = (e) => handleFileSelection(e.target.files[0]);

        function handleFileSelection(file) {
            if (file && file.type.startsWith('audio/')) {
                selectedFile = file;
                elements.fileNameDisplay.textContent = `${file.name} (${(file.size/1024/1024).toFixed(1)}MB)`;
                elements.fileInfo.classList.remove('hidden');
                elements.transcribeBtn.disabled = false;
                log(`📁 檔案已就位：${file.name}`);
            } else if (file) {
                alert("Monika，這不是音訊檔案喔，請重新拖放正確的檔案！");
            }
        }

        async function listAvailableModels(key) {
            log("🔍 掃描 API 授權清單...");
            try {
                const res = await fetch(`${BASE_URL}/${API_VERSION}/models?key=${encodeURIComponent(key)}`);
                const data = await res.json();
                return data.models ? data.models.map(m => m.name.replace("models/", "")) : [];
            } catch (e) {
                log("❌ 掃描失敗：" + e.message);
                return [];
            }
        }

        elements.checkModelsBtn.onclick = (e) => {
            e.preventDefault();
            const key = getSavedKey();
            if (!key) { alert("請先設定 API Key"); return; }
            listAvailableModels(key);
        };

        function getSavedKey() { return localStorage.getItem('gemini_api_key') || ""; }

        elements.saveKeyBtn.onclick = () => {
            const val = elements.apiKeyInput.value.trim();
            if (val) { localStorage.setItem('gemini_api_key', val); elements.settingsOverlay.classList.add('hidden'); log("⚙️ API 金鑰已成功存儲。"); }
        };

        async function startTranscription(file, key) {
            const encodedKey = encodeURIComponent(key.trim());
            try {
                log("1️⃣ 正在建立雲端安全連線...");
                elements.statusLabel.textContent = "與 Google 雲端連線中...";
                const uploadInit = await fetch(`${BASE_URL}/upload/${API_VERSION}/files?key=${encodedKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Goog-Upload-Protocol': 'resumable', 'X-Goog-Upload-Command': 'start', 'X-Goog-Upload-Header-Content-Length': file.size, 'X-Goog-Upload-Header-Content-Type': file.type },
                    body: JSON.stringify({ file: { display_name: `monika_final_${Date.now()}` } })
                });
                if (!uploadInit.ok) throw new Error(`連線失敗 (${uploadInit.status})`);
                const uploadUrl = uploadInit.headers.get('X-Goog-Upload-URL');

                log("2️⃣ 正在搬運錄音數據...");
                const uploadRes = await fetch(uploadUrl, { method: 'PUT', headers: { 'X-Goog-Upload-Protocol': 'resumable', 'X-Goog-Upload-Command': 'upload, finalize', 'X-Goog-Upload-Offset': '0' }, body: file });
                const uploadData = await uploadRes.json();
                const resourceName = uploadData.file.name;
                const fileUri = uploadData.file.uri;
                log(`✅ 搬運完成！正在排隊分析...`);

                log("3️⃣ AI 正在閱讀內容...");
                while (true) {
                    await new Promise(r => setTimeout(r, 4000));
                    const check = await fetch(`${BASE_URL}/${API_VERSION}/${resourceName}?key=${encodedKey}`);
                    const status = await check.json();
                    log(`⏳ 雲端解析中：${status.state}`);
                    if (status.state === "ACTIVE") break;
                    if (status.state === "FAILED") throw new Error("音檔解析失敗。");
                }

                // --- 增加 10 秒緩衝：徹底解決 503 過載 ---
                log("⌛ 緩衝 10 秒，讓 AI 整理思緒...");
                await new Promise(r => setTimeout(r, 10000));

                log(`4️⃣ 正式產出報告...`);
                elements.statusLabel.textContent = "AI 正在撰寫報告與標籤...";
                
                const prompt = "妳是 Monika 的專屬 AI 秘書，擅長製作精準會議紀錄。請針對錄音內容產出繁體中文：1.重點摘要與決策清單 2.根據會議內容產出 3-5 個重點 Hashtags 3.完整逐字稿。回傳格式必須為 JSON：{ \"summary\": \"內容\", \"hashtags\": [\"#標籤1\", \"#標籤2\"], \"transcript\": \"內容\" }。禁止簡體。";
                
                const fetchWithRetry = async (model, retries = 5, delay = 3000) => {
                    for (let i = 0; i < retries; i++) {
                        log(`🖋️ 嘗試產出報告 (使用 ${model}, 次數: ${i + 1})...`);
                        const response = await fetch(`${BASE_URL}/${API_VERSION}/models/${model}:generateContent?key=${encodedKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }, { fileData: { mimeType: file.type, fileUri: fileUri } }] }],
                                generationConfig: { responseMimeType: "application/json", temperature: 0.1 }
                            })
                        });

                        if (response.ok) { localStorage.setItem('last_successful_model', model); return response; }
                        
                        if (response.status === 404) {
                            log(`💡 模型 404，自動備援...`);
                            const models = await listAvailableModels(key);
                            const alt = models.find(m => m === "gemini-1.5-flash") || models.find(m => m.includes("flash")) || models[0];
                            if (alt && alt !== model) return fetchWithRetry(alt, retries, delay);
                        }

                        if (response.status === 503 || response.status === 429) {
                            log(`😴 伺服器忙碌 (${response.status})，${delay/1000} 秒後重試...`);
                            await new Promise(r => setTimeout(r, delay));
                            delay += 3000; continue;
                        }
                        throw new Error(`AI 生成失敗 (${response.status})`);
                    }
                    throw new Error("伺服器持續忙碌，請稍後再試。");
                };

                const finalResponse = await fetchWithRetry(CURRENT_MODEL);
                const result = await finalResponse.json();
                
                // --- 核心清洗邏輯：處理不乾淨的 JSON 字串 ---
                let text = result.candidates[0].content.parts[0].text;
                log("🧪 正在過濾 JSON 數據格式...");
                try {
                    // 去除 Markdown 代碼塊標記
                    text = text.replace(/```json/g, "").replace(/```/g, "").trim();
                    const parsed = JSON.parse(text);
                    log("🎉 解析成功！");
                    return parsed;
                } catch (jsonErr) {
                    log("⚠️ JSON 格式混亂，啟動強效過濾模式...");
                    const match = text.match(/\{[\s\S]*\}/);
                    if (match) return JSON.parse(match[0]);
                    throw new Error("AI 產出的內容格式有誤。");
                }
            } catch (e) {
                log(`🛑 [嚴重錯誤] ${e.message}`);
                throw e;
            }
        }

        elements.transcribeBtn.onclick = async () => {
            const key = getSavedKey();
            if (!key) { elements.settingsBtn.click(); return; }
            elements.transcribeBtn.disabled = true;
            elements.statusLabel.classList.remove('hidden', 'text-red-500');
            elements.resultSection.classList.add('hidden');
            elements.statusLabel.textContent = "啟動秘書引擎...";
            
            try {
                const data = await startTranscription(selectedFile, key);
                generatedData = data;
                elements.summaryContent.textContent = data.summary;
                elements.hashtagContainer.innerHTML = "";
                if (data.hashtags) {
                    data.hashtags.forEach(tag => {
                        const span = document.createElement('span');
                        span.className = "hashtag-pill";
                        span.textContent = tag.startsWith('#') ? tag : '#' + tag;
                        elements.hashtagContainer.appendChild(span);
                    });
                }
                elements.transcriptContainer.textContent = data.transcript;
                elements.resultSection.classList.remove('hidden');
                elements.statusLabel.classList.add('hidden');
            } catch (err) {
                elements.statusLabel.textContent = "❌ 處理失敗，請檢查日誌。";
                elements.statusLabel.classList.add('text-red-500');
            } finally {
                elements.transcribeBtn.disabled = false;
            }
        };

        elements.exportBtn.onclick = () => {
            const tagsText = (generatedData.hashtags || []).map(t => t.startsWith('#') ? t : '#' + t).join(' ');
            const docContent = `<html><body style="font-family: sans-serif; padding: 40px; color: #334155;">
                <h1 style="color: #0284C7; border-bottom: 3px solid #0284C7; padding-bottom: 12px; margin-bottom: 25px;">Monika AI 秘書報告</h1>
                <p style="color: #94a3b8; font-size: 14px;">產出日期：${new Date().toLocaleString()}</p>
                <div style="background:#FFFBEB; padding:30px; border-radius:20px; border: 1px solid #FDE68A; margin: 30px 0;">
                    <h2 style="color: #92400e; margin-top: 0; font-size: 20px;">重點摘要與行動清單</h2>
                    <div style="line-height: 1.8; font-size: 16px;">${generatedData.summary.replace(/\n/g, '<br>')}</div>
                    <p style="margin-top: 25px; color: #0369A1; font-weight: bold; font-size: 15px;">${tagsText}</p>
                </div>
                <h2 style="color: #1e293b; font-size: 20px;">會議完整逐字稿</h2>
                <div style="line-height: 1.8; color: #475569; font-size: 15px;">${generatedData.transcript.replace(/\n/g, '<br>')}</div>
                </body></html>`;
            const blob = new Blob(['\ufeff', docContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `會議紀錄_${new Date().toISOString().slice(0,10)}.doc`; a.click();
        };

        elements.settingsBtn.onclick = () => { elements.apiKeyInput.value = getSavedKey(); elements.settingsOverlay.classList.remove('hidden'); };
        elements.closeSettingsBtn.onclick = () => elements.settingsOverlay.classList.add('hidden');
    </script>
</body>
</html>
