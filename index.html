<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monika | AI 語音助理 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F1F5F9; }
        .drag-over { border-color: #0284C7 !important; background-color: #F0F9FF !important; }
        .loading-shimmer {
            background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .transcript-container::-webkit-scrollbar { width: 6px; }
        .transcript-container::-webkit-scrollbar-thumb { background-color: #CBD5E1; border-radius: 10px; }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-[#0F172A] text-white py-6 shadow-lg">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-12 h-12 bg-sky-500 rounded-xl flex items-center justify-center shadow-inner">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">AI 語音助理 <span class="text-sky-400 font-light">Pro</span></h1>
                    <p class="text-sm text-slate-400">Monika 專屬 AI 語音紀錄工具 (v2.8 終極修補版)</p>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <button id="settingsBtn" class="p-2 hover:bg-slate-700 rounded-lg transition-colors text-slate-300" title="設定 API Key">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </button>
                <div id="statusIndicator" class="hidden flex items-center space-x-2 bg-sky-500/10 px-4 py-2 rounded-full border border-sky-500/20">
                    <span id="statusLabel" class="text-sky-400 text-sm font-medium animate-pulse">準備中...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-10 max-w-5xl">
        <!-- Settings Overlay -->
        <div id="settingsOverlay" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-6">
            <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl">
                <h3 class="text-xl font-bold text-slate-800 mb-4">設定 API Key</h3>
                <p class="text-sm text-slate-500 mb-4">請貼上您的 Gemini API Key：</p>
                <input type="password" id="apiKeyInput" placeholder="在此貼上您的 API Key..." class="w-full px-4 py-3 border border-slate-200 rounded-xl mb-4 focus:ring-2 focus:ring-sky-500 outline-none">
                <div class="bg-blue-50 p-4 rounded-xl mb-6 text-xs text-blue-700 leading-relaxed">
                    <strong>💡 小提示：</strong><br>
                    若 22MB 檔案一直失敗，請確認 Key 沒貼錯。這組程式已自動修正檔名編碼問題。
                </div>
                <div class="flex space-x-3">
                    <button id="saveKeyBtn" class="flex-1 bg-sky-600 text-white py-3 rounded-xl font-bold hover:bg-sky-700 transition-colors">儲存設定</button>
                    <button id="closeSettingsBtn" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">關閉</button>
                </div>
            </div>
        </div>

        <!-- Upload Area -->
        <section id="dropZone" class="bg-white border-2 border-dashed border-slate-300 rounded-3xl p-12 text-center transition-all cursor-pointer hover:border-sky-500 hover:shadow-xl group">
            <input type="file" id="audioInput" class="hidden" accept="audio/*">
            <div class="flex flex-col items-center">
                <div class="w-20 h-20 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-sky-50 group-hover:text-sky-600 transition-all transform group-hover:scale-110">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-700 mb-2">點擊或拖放音檔至此</h2>
                <div id="fileInfo" class="hidden flex flex-col items-center mt-4">
                    <span id="fileNameDisplay" class="inline-flex items-center px-4 py-2 bg-sky-100 text-sky-700 rounded-full text-sm font-bold"></span>
                    <div id="uploadProgressContainer" class="hidden w-64 h-2 bg-slate-100 rounded-full mt-4 overflow-hidden">
                        <div id="uploadProgressBar" class="progress-bar w-0 h-full bg-sky-500"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Transcribe Button -->
        <div class="mt-8 flex justify-center">
            <button id="transcribeBtn" disabled class="bg-sky-600 text-white px-12 py-5 rounded-2xl font-bold text-lg shadow-2xl shadow-sky-200 hover:bg-sky-700 disabled:bg-slate-300 disabled:shadow-none transition-all flex items-center space-x-3 transform active:scale-95">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span>產出會議摘要與逐字稿</span>
            </button>
        </div>

        <!-- Result Section -->
        <div id="resultSection" class="mt-16 hidden space-y-8">
            <h2 class="text-2xl font-bold text-slate-800 flex items-center justify-between">
                <div class="flex items-center">
                    <span class="w-2 h-8 bg-sky-500 rounded-full mr-4"></span>
                    轉換成果
                </div>
                <button id="exportBtn" class="px-6 py-2 text-sm font-bold text-white bg-green-600 rounded-xl hover:bg-green-700 shadow-lg shadow-green-100 transition-all hidden">
                    匯出文件 (.doc)
                </button>
            </h2>

            <section id="summaryBox" class="bg-amber-50 border border-amber-100 rounded-3xl p-8 shadow-sm">
                <h3 class="text-xl font-bold text-amber-800 mb-4 flex items-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 1 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                    重點摘要與決策建議
                </h3>
                <div id="summaryContent" class="text-amber-900/80 leading-relaxed text-lg prose prose-amber max-w-none whitespace-pre-wrap"></div>
            </section>

            <section id="transcriptBox" class="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm">
                <h3 class="text-xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-4">完整逐字稿內容</h3>
                <div id="transcriptContainer" class="transcript-container max-h-[600px] overflow-y-auto text-slate-700 leading-relaxed text-lg whitespace-pre-wrap pr-4"></div>
            </section>
        </div>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 transition-all pointer-events-none z-50 flex items-center space-x-3">
            <span id="toastText"></span>
        </div>
    </main>

    <script>
        const MODEL_NAME = "gemini-1.5-flash"; 
        
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');

        const audioInput = document.getElementById('audioInput');
        const transcribeBtn = document.getElementById('transcribeBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const fileInfo = document.getElementById('fileInfo');
        const uploadProgressContainer = document.getElementById('uploadProgressContainer');
        const uploadProgressBar = document.getElementById('uploadProgressBar');
        const resultSection = document.getElementById('resultSection');
        const summaryContent = document.getElementById('summaryContent');
        const transcriptContainer = document.getElementById('transcriptContainer');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusLabel = document.getElementById('statusLabel');
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toastText');
        const exportBtn = document.getElementById('exportBtn');

        let selectedFile = null;
        let generatedData = { summary: "", transcript: "" };

        function showToast(msg) {
            toastText.textContent = msg;
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 5000);
        }

        function getSavedKey() { return localStorage.getItem('gemini_api_key') || ""; }
        
        settingsBtn.onclick = () => {
            apiKeyInput.value = getSavedKey();
            settingsOverlay.classList.remove('hidden');
        };
        closeSettingsBtn.onclick = () => settingsOverlay.classList.add('hidden');
        saveKeyBtn.onclick = () => {
            localStorage.setItem('gemini_api_key', apiKeyInput.value.trim());
            showToast('✅ API Key 已儲存');
            settingsOverlay.classList.add('hidden');
        };

        document.getElementById('dropZone').onclick = () => audioInput.click();
        document.getElementById('dropZone').ondragover = (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
        document.getElementById('dropZone').ondragleave = (e) => e.currentTarget.classList.remove('drag-over');
        document.getElementById('dropZone').ondrop = (e) => {
            e.preventDefault(); e.currentTarget.classList.remove('drag-over');
            handleFile(e.dataTransfer.files[0]);
        };
        audioInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            if (!file.type.startsWith('audio/')) { showToast('❌ 請選擇正確的音訊檔案'); return; }
            selectedFile = file;
            fileNameDisplay.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(1)}MB)`;
            fileInfo.classList.remove('hidden');
            transcribeBtn.disabled = false;
        }

        async function runTranscription(file, key) {
            try {
                // 1. 檔案上傳流程 (File API) - 強化版
                statusLabel.textContent = "正在向雲端預約傳送...";
                uploadProgressContainer.classList.remove('hidden');
                uploadProgressBar.style.width = "5%";
                
                // 檔名消毒：去除中文、空格與特殊符號，避免 Google 400 報錯
                const safeName = "file_" + Date.now() + "_" + file.name.replace(/[^\x00-\x7F]/g, "").replace(/\s+/g, "_");

                const uploadInitRes = await fetch(`https://generativelanguage.googleapis.com/upload/v1beta/files?key=${key}`, {
                    method: 'POST',
                    headers: { 
                        'X-Goog-Upload-Protocol': 'resumable', 
                        'X-Goog-Upload-Command': 'start',
                        'X-Goog-Upload-Header-Content-Length': file.size,
                        'X-Goog-Upload-Header-Content-Type': file.type,
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ file: { display_name: safeName } })
                });
                
                if (!uploadInitRes.ok) {
                    const errorJson = await uploadInitRes.json().catch(() => ({}));
                    const code = uploadInitRes.status;
                    const details = errorJson.error?.message || "Google 拒絕連線，請檢查 API Key 是否正確。";
                    throw new Error(`上傳初始化失敗 (代碼: ${code}): ${details}`);
                }
                
                const uploadUrl = uploadInitRes.headers.get('X-Goog-Upload-URL');
                uploadProgressBar.style.width = "20%";

                statusLabel.textContent = "傳送錄音檔案中...";
                const uploadRes = await fetch(uploadUrl, {
                    method: 'PUT',
                    headers: { 
                        'X-Goog-Upload-Protocol': 'resumable', 
                        'X-Goog-Upload-Command': 'upload, finalize', 
                        'X-Goog-Upload-Offset': '0',
                        'Content-Length': file.size 
                    },
                    body: file
                });

                if (!uploadRes.ok) throw new Error('檔案傳輸中斷，請確認網路穩定。');
                const uploadData = await uploadRes.json();
                const fileUri = uploadData.file.uri;
                const fileName = uploadData.file.name;
                uploadProgressBar.style.width = "60%";

                // 2. 檢查檔案處理狀態
                statusLabel.textContent = "雲端大腦正在解析音軌...";
                let attempts = 0;
                while (attempts < 50) {
                    await new Promise(r => setTimeout(r, 3000));
                    const statusCheck = await fetch(`https://generativelanguage.googleapis.com/v1beta/${fileName}?key=${key}`);
                    const statusData = await statusCheck.json();
                    if (statusData.state === "ACTIVE") break;
                    if (statusData.state === "FAILED") throw new Error('錄音檔格式不相容或已損毀。');
                    attempts++;
                }
                uploadProgressBar.style.width = "85%";

                // 3. 生成內容
                statusLabel.textContent = "AI 秘書正在寫報告...";
                const payload = {
                    contents: [{ 
                        parts: [
                            { text: "請分析這段錄音並回傳 JSON 格式，包含 'summary' (包含主題、結論與待辦事項) 與 'transcript' (去除贅字的繁體中文逐字稿) 兩個欄位。請絕對使用繁體中文。" },
                            { fileData: { mimeType: file.type, fileUri: fileUri } }
                        ]
                    }],
                    systemInstruction: { 
                        parts: [{ text: "妳是 Monika 的 AI 專屬秘書。請用專業、優雅的繁體中文產出會議報告。不要使用簡體中文或大陸用語。" }] 
                    },
                    generationConfig: { responseMimeType: "application/json", temperature: 0.1 }
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${key}`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorJson = await response.json().catch(() => ({}));
                    throw new Error(`AI 生成失敗: ${errorJson.error?.message || "伺服器超時，請稍後再試。"}`);
                }

                const data = await response.json();
                const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
                uploadProgressBar.style.width = "100%";
                return JSON.parse(textResult);
            } catch (e) {
                throw e;
            }
        }

        transcribeBtn.onclick = async () => {
            const key = getSavedKey();
            if (!key) { showToast('🔑 請先點擊右上角設定 API Key'); settingsBtn.click(); return; }
            if (!selectedFile) return;

            transcribeBtn.disabled = true;
            statusIndicator.classList.remove('hidden');
            resultSection.classList.remove('hidden');
            exportBtn.classList.add('hidden');
            summaryContent.innerHTML = `<div class="h-4 w-full loading-shimmer rounded mb-2"></div><div class="h-4 w-2/3 loading-shimmer rounded"></div>`;
            transcriptContainer.textContent = "啟動轉錄引擎...";

            try {
                const data = await runTranscription(selectedFile, key);
                generatedData = data;
                summaryContent.textContent = data.summary;
                transcriptContainer.textContent = data.transcript;
                exportBtn.classList.remove('hidden');
                showToast('✨ 報告產出成功！');
            } catch (err) {
                console.error(err);
                transcriptContainer.innerHTML = `<div class="bg-red-50 p-6 rounded-2xl border border-red-100 text-red-600 font-medium text-center">
                    <p class="text-lg mb-2">❌ 發生小意外</p>
                    <p class="text-sm opacity-80">${err.message}</p>
                    <p class="mt-4 text-xs">建議做法：請重新整理網頁，並確認檔案沒有毀損再試一次。</p>
                </div>`;
                summaryContent.innerHTML = `<span class="text-red-400">目前無法產出摘要</span>`;
                showToast('❌ 處理失敗，請看畫面下方說明');
            } finally {
                statusIndicator.classList.add('hidden');
                uploadProgressContainer.classList.add('hidden');
                transcribeBtn.disabled = false;
            }
        };

        exportBtn.onclick = () => {
            if (!generatedData.transcript) return;
            const docContent = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'></head><body>
                <h1 style="color: #0284C7;">Monika 的 AI 秘書會議報告</h1>
                <div style="background: #FFFBEB; padding: 15px; border-radius: 8px;">${generatedData.summary.replace(/\n/g, '<br>')}</div>
                <br>
                <h2>逐字稿全文</h2><p style="white-space: pre-wrap;">${generatedData.transcript}</p>
                </body></html>`;
            const blob = new Blob(['\ufeff', docContent], { type: 'application/msword' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `會議報告_${new Date().toISOString().slice(0,10)}.doc`;
            link.click();
            URL.revokeObjectURL(link.href);
        };
    </script>
</body>
</html>
