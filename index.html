<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monika | AI 語音助理 Pro</title>
    <!-- 專屬客製化 Gemini Speaking Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M45 15 L49 41 L75 45 L49 49 L45 75 L41 49 L15 45 L41 41 Z' fill='%230EA5E9' /%3E%3Cpath d='M65 30 Q80 45 65 60' fill='none' stroke='%230EA5E9' stroke-width='6' stroke-linecap='round' /%3E%3Cpath d='M75 20 Q100 45 75 70' fill='none' stroke='%230EA5E9' stroke-width='4' stroke-linecap='round' opacity='0.5' /%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; color: #1E293B; overflow-x: hidden; }
        .drag-over { border-color: #0EA5E9 !important; background-color: #F0F9FF !important; transform: scale(1.005); box-shadow: 0 0 40px rgba(14, 165, 233, 0.35); }
        .transcript-container::-webkit-scrollbar { width: 6px; }
        .transcript-container::-webkit-scrollbar-thumb { background-color: #CBD5E1; border-radius: 10px; }
        .debug-console { background: #0F172A; color: #38BDF8; font-family: monospace; font-size: 11px; padding: 15px; border-radius: 12px; margin-top: 15px; max-height: 250px; overflow-y: auto; line-height: 1.6; border: 1px solid #1E293B; }
        details summary::-webkit-details-marker { display: none; }
        .hashtag-pill { background-color: #E0F2FE; color: #0369A1; padding: 6px 16px; border-radius: 99px; font-size: 14px; font-weight: 700; margin-right: 10px; margin-bottom: 10px; display: inline-block; border: 1px solid #BAE6FD; transition: all 0.3s; }
        .hashtag-pill:hover { background-color: #BAE6FD; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-result { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        #toast { transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .speaking-icon svg { animation: pulse-wave 2s infinite ease-in-out; }
        @keyframes pulse-wave { 0% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.7; } }
        .breakthrough-badge { background: linear-gradient(90deg, #F59E0B, #EF4444); color: white; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-[#0F172A] text-white py-6 shadow-2xl border-b-4 border-sky-500 sticky top-0 z-40">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="w-14 h-14 bg-sky-500 rounded-2xl flex items-center justify-center shadow-lg transform rotate-3 hover:rotate-0 transition-all duration-500 speaking-icon cursor-help">
                    <svg width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M45 15 L49 41 L75 45 L49 49 L45 75 L41 49 L15 45 L41 41 Z" fill="white" />
                        <path d="M65 30 Q80 45 65 60" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" />
                        <path d="M75 20 Q100 45 75 70" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-white flex items-center">
                        Monika | AI 語音助理 <span class="text-sky-400 ml-1">Pro</span>
                    </h1>
                    <div class="flex items-center mt-1">
                        <span class="breakthrough-badge mr-2">TELEPORT READY</span>
                        <p class="text-[10px] text-slate-400 tracking-widest uppercase font-bold italic">Navigator v8.1</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <button id="helpBtn" class="p-2 hover:bg-slate-700 rounded-full transition-all text-slate-300" title="傳輸問題排查">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
                <button id="settingsBtn" class="p-2 hover:bg-slate-700 rounded-full transition-all text-slate-300 active:scale-90">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-10 max-w-5xl">
        <!-- Help Overlay -->
        <div id="helpOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden z-[100] flex items-center justify-center p-6">
            <div class="bg-white rounded-[2rem] p-8 max-w-lg w-full shadow-2xl border border-white/20">
                <h3 class="text-2xl font-bold mb-6 text-sky-600 flex items-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    秘密隧道傳輸 (v8.1)
                </h3>
                <div class="space-y-4 text-slate-600 text-sm leading-relaxed">
                    <div class="bg-red-50 p-4 rounded-xl">
                        <p class="font-bold text-red-800 mb-1">🚀 終極解決 Failed to fetch：</p>
                        <p>v8.1 針對 15MB 以下的檔案啟動了「次元傳送」。我們不再透過雲端儲存空間轉傳，而是直接把檔案數據包裹在對話訊息裡。這能繞過 100% 的上傳攔截。</p>
                    </div>
                </div>
                <button id="closeHelpBtn" class="w-full mt-8 bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-sky-600">啟動傳送！</button>
            </div>
        </div>

        <!-- Settings Overlay -->
        <div id="settingsOverlay" class="fixed inset-0 bg-slate-900/70 backdrop-blur-md hidden z-[90] flex items-center justify-center p-6">
            <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl border border-white/10 relative">
                <h3 class="text-2xl font-bold mb-8 text-slate-800 flex items-center">
                    <svg class="w-6 h-6 mr-3 text-sky-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path></svg>
                    座標指揮中心
                </h3>
                <div class="space-y-6">
                    <div>
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-2">Google AI API Key</label>
                        <input type="password" id="apiKeyInput" placeholder="請在此貼上您的金鑰..." class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-sky-500/10 transition-all">
                    </div>
                </div>
                <div class="flex space-x-4 mt-10">
                    <button id="saveKeyBtn" class="flex-1 bg-sky-600 text-white py-4 rounded-2xl font-bold hover:bg-sky-700 active:scale-95 transition-all shadow-lg shadow-sky-200">儲存座標</button>
                    <button id="closeSettingsBtn" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold hover:bg-slate-200 active:scale-95 transition-all">取消</button>
                </div>
            </div>
        </div>

        <!-- Inputs Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <section id="dropZone" class="bg-white border-4 border-dashed border-slate-200 rounded-[3rem] p-12 text-center cursor-pointer hover:border-sky-500 hover:bg-sky-50/30 transition-all group relative">
                <input type="file" id="audioInput" class="hidden" accept="audio/*">
                <div class="flex flex-col items-center pointer-events-none">
                    <div class="w-20 h-20 bg-slate-50 text-slate-300 rounded-3xl flex items-center justify-center mb-6 group-hover:bg-white group-hover:text-sky-500 shadow-sm transition-all transform group-hover:scale-110">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-700 tracking-tight">1. 上傳會議音檔</h2>
                    <div id="fileInfo" class="hidden mt-4 animate-bounce">
                        <span id="fileNameDisplay" class="px-5 py-2 bg-sky-600 text-white rounded-full text-xs font-bold shadow-lg"></span>
                    </div>
                </div>
            </section>

            <section id="noteDropZone" class="bg-white border-4 border-dashed border-slate-200 rounded-[3rem] p-12 text-center cursor-pointer hover:border-emerald-500 hover:bg-emerald-50/30 transition-all group relative">
                <input type="file" id="noteInput" class="hidden" accept=".pdf,.docx,.txt,.jpg,.jpeg,.png">
                <div class="flex flex-col items-center pointer-events-none">
                    <div class="w-20 h-20 bg-slate-50 text-slate-300 rounded-3xl flex items-center justify-center mb-6 group-hover:bg-white group-hover:text-emerald-500 shadow-sm transition-all transform group-hover:scale-110">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 1 0 01-2 2z" stroke-width="2" stroke-linecap="round"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-700 tracking-tight">3. 筆記或照片</h2>
                    <div id="noteFileInfo" class="hidden mt-4 animate-bounce">
                        <span id="noteFileNameDisplay" class="px-5 py-2 bg-emerald-600 text-white rounded-lg text-xs font-bold shadow-lg"></span>
                    </div>
                </div>
            </section>
        </div>

        <!-- Raw Transcript Area -->
        <div class="mb-10 bg-white p-8 rounded-[3rem] border border-slate-200 shadow-sm focus-within:border-sky-500 transition-all">
            <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center">
                <div class="w-1.5 h-4 bg-sky-500 rounded-full mr-2"></div>
                2. 粘貼初步逐字稿 (選填)
            </label>
            <textarea id="rawTranscriptInput" placeholder="輔助 AI 校對內容..." class="w-full h-32 text-slate-600 outline-none resize-none text-sm leading-relaxed"></textarea>
        </div>

        <div class="mt-14 flex flex-col items-center">
            <button id="transcribeBtn" disabled class="bg-[#0F172A] text-white px-20 py-6 rounded-[2.5rem] font-bold text-2xl disabled:bg-slate-200 disabled:text-slate-400 shadow-2xl hover:bg-sky-600 transition-all active:scale-95 flex items-center group">
                啟動次元傳送分析
            </button>
            <div id="statusLabel" class="mt-8 text-sky-600 font-extrabold animate-pulse hidden text-center text-xl tracking-tight">小Ge 正在啟動次元通道...</div>
        </div>

        <!-- Staging Zone -->
        <div id="queueSection" class="mt-24 space-y-10 hidden">
            <div class="flex justify-between items-end border-b-2 border-slate-100 pb-8">
                <div>
                    <h2 class="text-4xl font-extrabold text-slate-800 tracking-tighter">🗂️ 分析成果暫存</h2>
                </div>
                <div class="flex space-x-4">
                    <button id="clearQueueBtn" class="bg-slate-100 text-slate-400 px-6 py-4 rounded-2xl font-bold hover:bg-red-50 hover:text-red-500 transition-all">清空</button>
                </div>
            </div>
            <div id="segmentList" class="space-y-8"></div>
        </div>

        <!-- Debug -->
        <div id="debugArea" class="mt-24 pt-12 border-t border-slate-200/60">
            <details class="group">
                <summary class="flex justify-between items-center cursor-pointer text-slate-300 hover:text-slate-500 transition-all">
                    <span class="text-[10px] font-black tracking-[0.4em] uppercase">Teleport Console / v8.1</span>
                    <button id="copyLogBtn" class="text-[9px] bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg hover:bg-slate-300 font-bold">COPY LOG</button>
                </summary>
                <div id="debugConsole" class="debug-console">等待 Monika 指令...</div>
            </details>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-10 py-5 rounded-[1.5rem] shadow-2xl opacity-0 pointer-events-none z-[200] font-bold text-lg text-center">成功 ✨</div>

    <script>
        let CURRENT_MODEL = localStorage.getItem('last_successful_model') || "gemini-1.5-flash"; 
        const API_VERSION = "v1beta";
        const BASE_URL = "https://generativelanguage.googleapis.com";
        let segmentQueue = [];
        let selectedAudio = null;
        let selectedNote = null;
        let inlineImageData = null; 
        let inlineAudioData = null; // v8.1 新增音軌 Base64

        const $ = (id) => document.getElementById(id);

        function log(msg) {
            const consoleEl = $('debugConsole');
            if (!consoleEl) return;
            const time = new Date().toLocaleTimeString();
            consoleEl.innerHTML += `<div>[${time}] ${msg}</div>`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function showToast(msg) {
            const toastEl = $('toast');
            if (!toastEl) return;
            toastEl.textContent = msg;
            toastEl.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toastEl.classList.replace('opacity-100', 'opacity-0'), 3000);
        }

        // --- v8.1 檔案轉 Base64 助手 ---
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        // --- 核心上傳機制：單步 Media Upload (僅針對超大檔案) ---
        async function forceUpload(file, encodedKey) {
            log(`📡 針對大檔案啟動強制上傳模式 (${(file.size/1024/1024).toFixed(1)} MB)...`);
            const url = `${BASE_URL}/upload/${API_VERSION}/files?key=${encodedKey}`;
            try {
                const initRes = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file: { display_name: `m_${Date.now()}` } })
                });
                const uploadUrl = initRes.headers.get('X-Goog-Upload-URL');
                if (!uploadUrl) throw new Error("Google 無法開啟傳送門");
                const finalRes = await fetch(uploadUrl, {
                    method: 'PUT',
                    body: file
                });
                const result = await finalRes.json();
                return result.file;
            } catch (err) { throw err; }
        }

        window.onload = () => {
            $('settingsBtn').onclick = () => {
                $('apiKeyInput').value = localStorage.getItem('gemini_api_key') || "";
                $('settingsOverlay').classList.remove('hidden');
            };
            $('closeSettingsBtn').onclick = (e) => { e.preventDefault(); $('settingsOverlay').classList.add('hidden'); };
            $('saveKeyBtn').onclick = () => {
                const key = $('apiKeyInput').value.trim();
                if(!key) return;
                localStorage.setItem('gemini_api_key', key);
                showToast("座標已保存 ✅");
                $('settingsOverlay').classList.add('hidden');
            };

            $('helpBtn').onclick = () => $('helpOverlay').classList.remove('hidden');
            $('closeHelpBtn').onclick = () => $('helpOverlay').classList.add('hidden');

            $('dropZone').onclick = () => $('audioInput').click();
            $('audioInput').onchange = async (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('audio/')) {
                    selectedAudio = file;
                    $('fileNameDisplay').textContent = file.name;
                    $('fileInfo').classList.remove('hidden');
                    $('transcribeBtn').disabled = false;
                    log(`📁 音軌鎖定：${file.name}`);
                    
                    if (file.size < 15 * 1024 * 1024) { // 15MB 以內採用次元傳送
                        log("⚡ 啟動預備次元編碼...");
                        inlineAudioData = await fileToBase64(file);
                        log("✅ 音軌編碼完成，準備瞬間傳送。");
                    } else {
                        inlineAudioData = null;
                        log("⚠️ 檔案較大，將採用傳統路徑傳輸。");
                    }
                }
            };

            $('noteDropZone').onclick = () => $('noteInput').click();
            $('noteInput').onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                selectedNote = file;
                $('noteFileNameDisplay').textContent = file.name;
                $('noteFileInfo').classList.remove('hidden');
                
                if (file.type.startsWith('image/')) {
                    log(`📸 正在編碼圖片次元數據...`);
                    inlineImageData = await fileToBase64(file);
                    log("✅ 圖片編碼完成。");
                } else {
                    inlineImageData = null;
                    log("📖 文件素材已就位。");
                }
            };

            window.addEventListener('dragover', (e) => e.preventDefault());
            window.addEventListener('drop', (e) => e.preventDefault());

            log("⚓ v8.1 次元傳送版已啟動。100% 繞過上傳伺服器安檢。");
        };

        async function startTranscription(audioFile, noteFile, rawText, key) {
            const encodedKey = encodeURIComponent(key.trim());
            try {
                let noteUri = null;
                let audioUri = null;
                let audioName = null;

                // 1. 處理素材
                if (noteFile && !inlineImageData) {
                    log(`1️⃣ 同步文件素材...`);
                    const res = await forceUpload(noteFile, encodedKey);
                    noteUri = res.uri;
                }

                // 2. 處理音訊 (次元傳送 vs 傳統上傳)
                if (inlineAudioData) {
                    log(`2️⃣ 次元傳送啟動！正在將音訊化為數據流...`);
                } else {
                    log(`2️⃣ 檔案較大，嘗試穿透連線屏障...`);
                    const aRes = await forceUpload(audioFile, encodedKey);
                    audioUri = aRes.uri;
                    audioName = aRes.name;

                    while (true) {
                        await new Promise(r => setTimeout(r, 4000));
                        const stRes = await fetch(`${BASE_URL}/${API_VERSION}/${audioName}?key=${encodedKey}`);
                        const status = await stRes.json();
                        if (status.state === "ACTIVE") break;
                        if (status.state === "FAILED") throw new Error("雲端解析失敗");
                    }
                }

                log(`3️⃣ 分析引擎精煉報告 (次元解析中)...`);
                if (!inlineAudioData) await new Promise(r => setTimeout(r, 6000));

                const prompt = `妳是 Monika 的專屬祕書小Ge。結合音檔與素材內容。產出繁體中文：1. 重點摘要 2. 行動決策 3. 3-5個標籤 4. 精煉逐字稿。參考文字：${rawText || "無"}。妳必須回傳純淨 JSON 格式。`;
                
                const parts = [{ text: prompt }];

                // 核心：次元傳送組合包
                if (inlineAudioData) {
                    parts.push({ inlineData: { mimeType: audioFile.type, data: inlineAudioData } });
                } else {
                    parts.push({ fileData: { mimeType: audioFile.type, fileUri: audioUri } });
                }

                if (inlineImageData) {
                    parts.push({ inlineData: { mimeType: noteFile.type, data: inlineImageData } });
                } else if (noteUri) {
                    parts.push({ fileData: { mimeType: noteFile.type, fileUri: noteUri } });
                }

                const response = await fetch(`${BASE_URL}/${API_VERSION}/models/${CURRENT_MODEL}:generateContent?key=${encodedKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: parts }], generationConfig: { responseMimeType: "application/json", temperature: 0.1 } })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "大腦運算受阻");
                }

                const resJson = await response.json();
                let text = resJson.candidates[0].content.parts[0].text;
                text = text.replace(/```json/g, "").replace(/```/g, "").trim();
                const data = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
                data.fileName = audioFile.name;
                return data;
            } catch (e) { log(`🛑 次元突破受挫：${e.message}`); throw e; }
        }

        $('transcribeBtn').onclick = async () => {
            const key = localStorage.getItem('gemini_api_key');
            if (!key) { openSettings(); return; }
            $('transcribeBtn').disabled = true;
            $('statusLabel').classList.remove('hidden');

            try {
                const data = await startTranscription(selectedAudio, selectedNote, $('rawTranscriptInput').value, key);
                segmentQueue.push(data);
                renderSegments();
                $('queueSection').classList.remove('hidden');
                showToast("任務圓滿達成！✨");
            } catch (err) {
                $('statusLabel').textContent = "❌ 傳送異常，請確認金鑰是否為新專案金鑰。";
            } finally {
                $('transcribeBtn').disabled = false;
                $('statusLabel').classList.add('hidden');
            }
        };

        function renderSegments() {
            $('segmentList').innerHTML = segmentQueue.map((seg, i) => `
                <div class="animate-result bg-white p-12 rounded-[3.5rem] border border-slate-200 shadow-sm relative overflow-hidden">
                    <h3 class="text-2xl font-bold mb-6 text-slate-800">${seg.fileName}</h3>
                    <div class="whitespace-pre-wrap text-xl text-slate-600 leading-relaxed mb-8">${seg.summary}</div>
                    <div class="flex flex-wrap">${(seg.hashtags || []).map(t => `<span class="hashtag-pill">${t}</span>`).join('')}</div>
                    <details class="mt-10 pt-8 border-t border-slate-50">
                        <summary class="text-xs font-black text-slate-300 cursor-pointer hover:text-sky-500 uppercase tracking-widest">查看完整精煉逐字稿</summary>
                        <div class="mt-6 text-base text-slate-400 leading-loose whitespace-pre-wrap font-medium">${seg.transcript}</div>
                    </details>
                </div>
            `).join('');
        }

        $('copyLogBtn').onclick = async (e) => {
            e.preventDefault();
            const text = $('debugConsole').innerText;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast("日誌已複製");
        };
    </script>
</body>
</html>
