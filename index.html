<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monika | AI 語音助理 Pro</title>
    <!-- 專屬客製化 Gemini Speaking Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M45 15 L49 41 L75 45 L49 49 L45 75 L41 49 L15 45 L41 41 Z' fill='%230EA5E9' /%3E%3Cpath d='M65 30 Q80 45 65 60' fill='none' stroke='%230EA5E9' stroke-width='6' stroke-linecap='round' /%3E%3Cpath d='M75 20 Q100 45 75 70' fill='none' stroke='%230EA5E9' stroke-width='4' stroke-linecap='round' opacity='0.5' /%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; color: #1E293B; overflow-x: hidden; }
        .drag-over-audio { border-color: #0EA5E9 !important; background-color: #F0F9FF !important; transform: scale(1.01); box-shadow: 0 0 40px rgba(14, 165, 233, 0.35); }
        .drag-over-note { border-color: #10B981 !important; background-color: #ECFDF5 !important; transform: scale(1.01); box-shadow: 0 0 40px rgba(16, 185, 129, 0.35); }
        .transcript-container::-webkit-scrollbar { width: 6px; }
        .transcript-container::-webkit-scrollbar-thumb { background-color: #CBD5E1; border-radius: 10px; }
        .debug-console { background: #0F172A; color: #38BDF8; font-family: monospace; font-size: 11px; padding: 15px; border-radius: 12px; margin-top: 15px; max-height: 250px; overflow-y: auto; line-height: 1.6; border: 1px solid #1E293B; }
        details summary::-webkit-details-marker { display: none; }
        .hashtag-pill { background-color: #E0F2FE; color: #0369A1; padding: 6px 16px; border-radius: 99px; font-size: 14px; font-weight: 700; margin-right: 10px; margin-bottom: 10px; display: inline-block; border: 1px solid #BAE6FD; transition: all 0.3s; }
        .hashtag-pill:hover { background-color: #BAE6FD; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-result { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        #toast { transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .speaking-icon svg { animation: pulse-wave 2s infinite ease-in-out; }
        @keyframes pulse-wave { 0% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.7; } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-[#0F172A] text-white py-6 shadow-2xl border-b-4 border-sky-500 sticky top-0 z-40">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="w-14 h-14 bg-sky-500 rounded-2xl flex items-center justify-center shadow-lg transform rotate-3 hover:rotate-0 transition-all duration-500 speaking-icon cursor-help" title="小Ge 正在為您守護連線">
                    <svg width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M45 15 L49 41 L75 45 L49 49 L45 75 L41 49 L15 45 L41 41 Z" fill="white" />
                        <path d="M65 30 Q80 45 65 60" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" />
                        <path d="M75 20 Q100 45 75 70" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-white">Monika | AI 語音助理 <span class="text-sky-400">Pro</span></h1>
                    <p class="text-[10px] text-slate-400 tracking-widest uppercase font-bold italic">Deep-Resilient v6.3</p>
                </div>
            </div>
            <button id="settingsBtn" class="p-2 hover:bg-slate-700 rounded-full transition-all text-slate-300 active:scale-90">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
            </button>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-10 max-w-5xl">
        <!-- Settings Overlay -->
        <div id="settingsOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden z-50 flex items-center justify-center p-6">
            <div class="bg-white rounded-[2rem] p-8 max-w-md w-full shadow-2xl max-h-[90vh] overflow-y-auto border border-white/20">
                <h3 class="text-xl font-bold mb-6 text-slate-800 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-sky-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                    系統指揮中心
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Google AI API Key</label>
                        <input type="password" id="apiKeyInput" placeholder="請貼上您的 API Key..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-4 focus:ring-sky-500/10 transition-all">
                    </div>
                    
                    <details class="group mt-4 border border-slate-100 rounded-xl p-3">
                        <summary class="text-xs font-bold text-slate-400 cursor-pointer hover:text-sky-500 flex justify-between items-center">
                            <span>擴充：Notion 串接 (選填)</span>
                            <svg class="w-4 h-4 group-open:rotate-180 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </summary>
                        <div class="space-y-3 mt-3">
                            <input type="password" id="notionTokenInput" placeholder="Token..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs">
                            <input type="text" id="notionDbInput" placeholder="Database ID..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs">
                        </div>
                    </details>
                </div>
                <div class="flex space-x-3 mt-8">
                    <button id="saveKeyBtn" class="flex-1 bg-sky-600 text-white py-3 rounded-xl font-bold hover:bg-sky-700 active:scale-95 transition-all">儲存並重啟</button>
                    <button id="closeSettingsBtn" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 active:scale-95 transition-all">取消</button>
                </div>
            </div>
        </div>

        <!-- Inputs Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <section id="dropZone" class="bg-white border-4 border-dashed border-slate-200 rounded-[2.5rem] p-10 text-center cursor-pointer hover:border-sky-500 hover:bg-sky-50/30 transition-all group relative">
                <input type="file" id="audioInput" class="hidden" accept="audio/*">
                <div class="flex flex-col items-center pointer-events-none">
                    <div class="w-16 h-16 bg-slate-50 text-slate-300 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-white group-hover:text-sky-500 shadow-sm transition-all transform group-hover:scale-110">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <h2 class="text-xl font-bold text-slate-700 tracking-tight">1. 上傳會議音檔 (必填)</h2>
                    <div id="fileInfo" class="hidden mt-4 animate-bounce">
                        <span id="fileNameDisplay" class="px-4 py-2 bg-sky-600 text-white rounded-lg text-xs font-bold shadow-lg border border-sky-400"></span>
                    </div>
                </div>
            </section>

            <section id="noteDropZone" class="bg-white border-4 border-dashed border-slate-200 rounded-[2.5rem] p-10 text-center cursor-pointer hover:border-emerald-500 hover:bg-emerald-50/30 transition-all group relative">
                <input type="file" id="noteInput" class="hidden" accept=".pdf,.docx,.txt,.jpg,.jpeg,.png">
                <div class="flex flex-col items-center pointer-events-none">
                    <div class="w-16 h-16 bg-slate-50 text-slate-300 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-white group-hover:text-emerald-500 shadow-sm transition-all transform group-hover:scale-110">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 1 0 01-2 2z"></path></svg>
                    </div>
                    <h2 class="text-xl font-bold text-slate-700 tracking-tight">3. 筆記素材或截圖 (選填)</h2>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-widest">PDF / JPG / PNG / TXT</p>
                    <div id="noteFileInfo" class="hidden mt-4 animate-bounce">
                        <span id="noteFileNameDisplay" class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-xs font-bold shadow-lg border border-emerald-400"></span>
                    </div>
                </div>
            </section>
        </div>

        <!-- 2. Raw Transcript Area -->
        <div class="mb-10 bg-white p-8 rounded-[3rem] border border-slate-200 shadow-sm focus-within:border-sky-500 transition-all">
            <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center">
                <div class="w-1.5 h-4 bg-sky-500 rounded-full mr-2"></div>
                2. 粘貼初步逐字稿內容 (選填)
            </label>
            <textarea id="rawTranscriptInput" placeholder="輔助 AI 修正、對齊內容..." class="w-full h-32 text-slate-600 outline-none resize-none text-sm leading-relaxed"></textarea>
        </div>

        <div class="mt-14 flex flex-col items-center">
            <button id="transcribeBtn" disabled class="bg-[#0F172A] text-white px-20 py-6 rounded-[2.5rem] font-bold text-2xl disabled:bg-slate-200 disabled:text-slate-400 shadow-2xl hover:bg-sky-600 transition-all active:scale-95 flex items-center group">
                啟動領航全效分析
            </button>
            <div id="statusLabel" class="mt-8 text-sky-600 font-extrabold animate-pulse hidden text-center text-xl tracking-tight">小Ge 正在穩定同步數據中...</div>
        </div>

        <!-- Staging Zone -->
        <div id="queueSection" class="mt-24 space-y-10 hidden">
            <div class="flex justify-between items-end border-b-2 border-slate-100 pb-8">
                <div>
                    <h2 class="text-4xl font-extrabold text-slate-800 tracking-tighter">🗂️ 分析成果暫存區</h2>
                    <p class="text-slate-400 text-lg mt-2 font-medium italic">您可以合併多個片段進行最後處理</p>
                </div>
                <div class="flex space-x-4">
                    <button id="syncAllNotionBtn" class="hidden bg-sky-600 text-white px-8 py-4 rounded-[1.5rem] font-bold text-lg shadow-xl hover:bg-sky-700 transition-all transform hover:-translate-y-1">🚀 同步至 Notion</button>
                    <button id="exportAllWordBtn" class="bg-emerald-600 text-white px-8 py-4 rounded-[1.5rem] font-bold text-lg shadow-xl hover:bg-emerald-700 transition-all">📄 匯出 Word</button>
                    <button id="clearQueueBtn" class="bg-slate-100 text-slate-400 px-6 py-4 rounded-[1.5rem] font-bold hover:bg-red-50 hover:text-red-500 transition-all">清空暫存</button>
                </div>
            </div>
            <div id="segmentList" class="space-y-8"></div>
        </div>

        <!-- Debug -->
        <div id="debugArea" class="mt-24 pt-12 border-t border-slate-200/60">
            <details class="group">
                <summary class="flex justify-between items-center cursor-pointer text-slate-300 hover:text-slate-500 transition-all">
                    <span class="text-[10px] font-black tracking-[0.4em] uppercase">Navigator Deep-Resilient / Debug</span>
                    <button id="copyLogBtn" class="text-[9px] bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg hover:bg-slate-300 font-bold">COPY LOG</button>
                </summary>
                <div id="debugConsole" class="debug-console">等待 Monika 下達指令...</div>
            </details>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-10 py-5 rounded-[1.5rem] shadow-2xl opacity-0 pointer-events-none z-[100] font-bold text-lg text-center">成功 ✨</div>

    <script>
        // --- 核心配置與大腦導航 ---
        let CURRENT_MODEL = localStorage.getItem('last_successful_model') || "gemini-1.5-flash"; 
        const API_VERSION = "v1beta";
        const BASE_URL = "https://generativelanguage.googleapis.com";
        let segmentQueue = [];
        let selectedAudio = null;
        let selectedNote = null;

        const $ = (id) => document.getElementById(id);
        const elements = {
            audioInput: () => $('audioInput'),
            noteInput: () => $('noteInput'),
            rawTranscriptInput: () => $('rawTranscriptInput'),
            transcribeBtn: () => $('transcribeBtn'),
            dropZone: () => $('dropZone'),
            noteDropZone: () => $('noteDropZone'),
            fileNameDisplay: () => $('fileNameDisplay'),
            noteFileNameDisplay: () => $('noteFileNameDisplay'),
            statusLabel: () => $('statusLabel'),
            segmentList: () => $('segmentList'),
            queueSection: () => $('queueSection'),
            debugConsole: () => $('debugConsole'),
            toast: () => $('toast'),
            settingsBtn: () => $('settingsBtn'),
            settingsOverlay: () => $('settingsOverlay'),
            saveKeyBtn: () => $('saveKeyBtn'),
            closeSettingsBtn: () => $('closeSettingsBtn'),
            apiKeyInput: () => $('apiKeyInput'),
            notionTokenInput: () => $('notionTokenInput'),
            notionDbInput: () => $('notionDbInput'),
            syncAllNotionBtn: () => $('syncAllNotionBtn'),
            copyLogBtn: () => $('copyLogBtn'),
            fileInfo: () => $('fileInfo'),
            noteFileInfo: () => $('noteFileInfo')
        };

        function log(msg) {
            const consoleEl = elements.debugConsole();
            if (!consoleEl) return;
            const time = new Date().toLocaleTimeString();
            consoleEl.innerHTML += `<div>[${time}] ${msg}</div>`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function showToast(msg) {
            const toastEl = elements.toast();
            if (!toastEl) return;
            toastEl.textContent = msg;
            toastEl.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toastEl.classList.replace('opacity-100', 'opacity-0'), 3000);
        }

        // --- 超強韌深海 Fetch 救援隊 (解決 Failed to fetch) ---
        async function fetchWithResiliency(url, options, retries = 4, delay = 2500) {
            try {
                const response = await fetch(url, options);
                // 針對 5xx 錯誤或忙碌進行重試
                if (!response.ok && retries > 0 && [429, 500, 502, 503, 504].includes(response.status)) {
                    log(`⚠️ 伺服器稍忙 (HTTP ${response.status})，${delay/1000}秒後嘗試修復...`);
                    await new Promise(r => setTimeout(r, delay));
                    return fetchWithResiliency(url, options, retries - 1, delay * 1.5);
                }
                return response;
            } catch (err) {
                // 針對真正的網路中斷 (TypeError: Failed to fetch) 進行特殊救援
                if (retries > 0) {
                    log(`🔌 攔截到網路波動，啟動深海救援 (${retries})...`);
                    await new Promise(r => setTimeout(r, delay));
                    return fetchWithResiliency(url, options, retries - 1, delay * 2);
                }
                throw err;
            }
        }

        // --- 大腦偵測系統 ---
        async function autoDiscoverModel(key) {
            if (!key) return;
            log("🔍 領航者偵測雲端大腦...");
            try {
                const res = await fetch(`${BASE_URL}/${API_VERSION}/models?key=${encodeURIComponent(key)}`);
                const data = await res.json();
                if (data.models) {
                    const names = data.models.map(m => m.name.replace("models/", ""));
                    const best = names.find(m => m.includes("2.5-flash")) || 
                                names.find(m => m.includes("1.5-flash")) || names[0];
                    if (best) {
                        CURRENT_MODEL = best;
                        localStorage.setItem('last_successful_model', best);
                        log(`🚀 大腦已鎖定：${best}`);
                        return;
                    }
                }
            } catch (e) { log("🛰️ 座標偵測微弱，進入穩定航行。"); }
            CURRENT_MODEL = "gemini-1.5-flash";
        }

        // --- 全域拖放與文件監聽 ---
        function setupGlobalDragDrop() {
            const prevent = (e) => { e.preventDefault(); e.stopPropagation(); };
            window.addEventListener('dragover', prevent);
            window.addEventListener('drop', prevent);

            const aDrop = elements.dropZone();
            const nDrop = elements.noteDropZone();

            if (aDrop) {
                aDrop.addEventListener('dragover', (e) => { prevent(e); aDrop.classList.add('drag-over-audio'); });
                aDrop.addEventListener('dragleave', (e) => { prevent(e); aDrop.classList.remove('drag-over-audio'); });
                aDrop.addEventListener('drop', (e) => {
                    prevent(e);
                    aDrop.classList.remove('drag-over-audio');
                    if(e.dataTransfer.files[0]) handleAudioFile(e.dataTransfer.files[0]);
                });
            }

            if (nDrop) {
                nDrop.addEventListener('dragover', (e) => { prevent(e); nDrop.classList.add('drag-over-note'); });
                nDrop.addEventListener('dragleave', (e) => { prevent(e); nDrop.classList.remove('drag-over-note'); });
                nDrop.addEventListener('drop', (e) => {
                    prevent(e);
                    nDrop.classList.remove('drag-over-note');
                    if(e.dataTransfer.files[0]) handleNoteFile(e.dataTransfer.files[0]);
                });
            }
        }

        function handleAudioFile(file) {
            if (file && file.type.startsWith('audio/')) {
                selectedAudio = file;
                const display = elements.fileNameDisplay();
                if (display) display.textContent = file.name;
                const info = elements.fileInfo();
                if (info) info.classList.remove('hidden');
                const btn = elements.transcribeBtn();
                if (btn) btn.disabled = false;
                log(`📁 音軌鎖定：${file.name}`);
            }
        }

        function handleNoteFile(file) {
            const validExts = ['pdf', 'docx', 'txt', 'jpg', 'jpeg', 'png'];
            const ext = file.name.split('.').pop().toLowerCase();
            if (file && validExts.includes(ext)) {
                selectedNote = file;
                const display = elements.noteFileNameDisplay();
                if (display) display.textContent = file.name;
                const info = elements.noteFileInfo();
                if (info) info.classList.remove('hidden');
                log(`📖 參考素材鎖定：${file.name}`);
            } else if (file) {
                alert("Monika，目前支援 PDF, JPG, PNG 等常用格式喔！");
            }
        }

        // --- 初始化與設定 ---
        window.addEventListener('load', () => {
            const key = localStorage.getItem('gemini_api_key');
            if (key) autoDiscoverModel(key);
            
            elements.settingsBtn().onclick = () => {
                elements.apiKeyInput().value = localStorage.getItem('gemini_api_key') || "";
                elements.notionTokenInput().value = localStorage.getItem('notion_token') || "";
                elements.notionDbInput().value = localStorage.getItem('notion_db_id') || "";
                elements.settingsOverlay().classList.remove('hidden');
            };

            elements.closeSettingsBtn().onclick = (e) => { e.preventDefault(); elements.settingsOverlay().classList.add('hidden'); };

            elements.saveKeyBtn().onclick = () => {
                const val = elements.apiKeyInput().value.trim();
                localStorage.setItem('gemini_api_key', val);
                localStorage.setItem('notion_token', elements.notionTokenInput().value.trim());
                localStorage.setItem('notion_db_id', elements.notionDbInput().value.trim());
                elements.settingsOverlay().classList.add('hidden');
                if (val) autoDiscoverModel(val);
                refreshNotionVisibility();
                showToast("導航數據已更新 ✅");
            };

            elements.dropZone().onclick = () => elements.audioInput().click();
            elements.audioInput().onchange = (e) => handleAudioFile(e.target.files[0]);
            elements.noteDropZone().onclick = () => elements.noteInput().click();
            elements.noteInput().onchange = (e) => handleNoteFile(e.target.files[0]);

            refreshNotionVisibility();
            setupGlobalDragDrop();
            log("⚓ Navigator 系統已完成深海強固配置。");
        });

        function refreshNotionVisibility() {
            const token = localStorage.getItem('notion_token');
            const dbId = localStorage.getItem('notion_db_id');
            const btn = elements.syncAllNotionBtn();
            if (btn) {
                if (token && dbId) btn.classList.remove('hidden');
                else btn.classList.add('hidden');
            }
        }

        // --- 核心引擎：分階段上傳與深度分析 ---
        async function startTranscription(audioFile, noteFile, rawText, key) {
            const encodedKey = encodeURIComponent(key.trim());
            try {
                let noteUri = null;

                // --- 預熱步驟：輕量探測 ---
                log("🧪 探測傳輸通道...");
                await fetch(`${BASE_URL}/${API_VERSION}/models?key=${encodedKey}`).catch(()=>{});

                // 1. 同步參考素材 (第 1 階段)
                if (noteFile) {
                    log(`1️⃣ 素材同步中 (${(noteFile.size/1024).toFixed(1)} KB)...`);
                    const nUploadInit = await fetchWithResiliency(`${BASE_URL}/upload/${API_VERSION}/files?key=${encodedKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Goog-Upload-Protocol': 'resumable', 'X-Goog-Upload-Command': 'start', 'X-Goog-Upload-Header-Content-Length': noteFile.size, 'X-Goog-Upload-Header-Content-Type': noteFile.type },
                        body: JSON.stringify({ file: { display_name: `ref_${Date.now()}` } })
                    });
                    const nUrl = nUploadInit.headers.get('X-Goog-Upload-URL');
                    const nRes = await (await fetchWithResiliency(nUrl, { method: 'PUT', body: noteFile })).json();
                    noteUri = nRes.file.uri;
                    log(`✅ 素材上傳圓滿達成。`);
                    
                    log(`⌛ 正在為音軌同步清空通道 (4秒)...`);
                    await new Promise(r => setTimeout(r, 4000));
                }

                // 2. 同步音訊大數據 (第 2 階段)
                log(`2️⃣ 傳送音訊位元 (${(audioFile.size/1024/1024).toFixed(1)} MB)...`);
                elements.statusLabel().textContent = "正在穩定同步音軌位元...";
                const aUploadInit = await fetchWithResiliency(`${BASE_URL}/upload/${API_VERSION}/files?key=${encodedKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Goog-Upload-Protocol': 'resumable', 'X-Goog-Upload-Command': 'start', 'X-Goog-Upload-Header-Content-Length': audioFile.size, 'X-Goog-Upload-Header-Content-Type': audioFile.type },
                    body: JSON.stringify({ file: { display_name: `audio_${Date.now()}` } })
                });
                const aUrl = aUploadInit.headers.get('X-Goog-Upload-URL');
                const aRes = await (await fetchWithResiliency(aUrl, { method: 'PUT', body: audioFile })).json();
                const audioUri = aRes.file.uri;
                const audioName = aRes.file.name;

                log(`⏳ 雲端接收完畢，大腦正在理解音軌內容...`);
                while (true) {
                    await new Promise(r => setTimeout(r, 4000));
                    const statusRes = await fetchWithResiliency(`${BASE_URL}/${API_VERSION}/${audioName}?key=${encodedKey}`);
                    const status = await statusRes.json();
                    if (status.state === "ACTIVE") break;
                    if (status.state === "FAILED") throw new Error("音訊分析失敗");
                }

                log(`3️⃣ 分析引擎精煉報告 (10s 冷靜期)...`);
                await new Promise(r => setTimeout(r, 10000));

                const prompt = `妳是 Monika 的專屬祕書小Ge。
                請精確聽辨錄音，結合【參考素材】內容進行校對與對齊。若有圖片請識別其中文字。
                產出繁體中文：1. 重點摘要 2. 行動決策 3. 3-5個精準標籤 4. 精煉正式逐字稿。
                初步參考：${rawText || "無"}。
                妳必須回傳純淨 JSON：{ "summary": "內容", "hashtags": ["#標籤"], "transcript": "內容" }。絕對禁止簡體。`;

                const parts = [{ text: prompt }, { fileData: { mimeType: audioFile.type, fileUri: audioUri } }];
                if (noteUri) parts.push({ fileData: { mimeType: noteFile.type, fileUri: noteUri } });

                const response = await fetchWithResiliency(`${BASE_URL}/${API_VERSION}/models/${CURRENT_MODEL}:generateContent?key=${encodedKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: parts }], generationConfig: { responseMimeType: "application/json", temperature: 0.1 } })
                });

                const resJson = await response.json();
                let text = resJson.candidates[0].content.parts[0].text;
                text = text.replace(/```json/g, "").replace(/```/g, "").trim();
                const data = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
                data.fileName = audioFile.name;
                return data;
            } catch (e) { log(`🛑 通訊受挫: ${e.message}`); throw e; }
        }

        elements.transcribeBtn().onclick = async () => {
            const key = localStorage.getItem('gemini_api_key');
            if (!key) { elements.settingsBtn().click(); return; }
            const btn = elements.transcribeBtn();
            btn.disabled = true;
            elements.statusLabel().classList.remove('hidden');

            try {
                const data = await startTranscription(selectedAudio, selectedNote, elements.rawTranscriptInput().value, key);
                segmentQueue.push(data);
                renderSegments();
                elements.queueSection().classList.remove('hidden');
                showToast("分析任務順利達成！✨");
            } catch (err) {
                elements.statusLabel().textContent = "❌ 傳輸受阻，小Ge 正在重新校準通道。";
                log("📌 提示：如果持續失敗，請嘗試更換網路或稍微縮減筆記圖片大小。");
            } finally {
                btn.disabled = false;
                elements.statusLabel().classList.add('hidden');
            }
        };

        function renderSegments() {
            elements.segmentList().innerHTML = segmentQueue.map((seg, i) => `
                <div class="animate-result bg-white p-12 rounded-[3.5rem] border border-slate-200 shadow-sm relative overflow-hidden">
                    <span class="text-[10px] font-black text-sky-500 uppercase tracking-widest mb-3 block">Deep Insight Result #${i+1}</span>
                    <h3 class="text-2xl font-bold mb-6 text-slate-800">${seg.fileName}</h3>
                    <div class="whitespace-pre-wrap text-xl text-slate-600 leading-relaxed mb-8">${seg.summary}</div>
                    <div class="flex flex-wrap">${(seg.hashtags || []).map(t => `<span class="hashtag-pill">${t}</span>`).join('')}</div>
                    <details class="mt-10 pt-8 border-t border-slate-50">
                        <summary class="text-xs font-black text-slate-300 cursor-pointer hover:text-sky-500 uppercase tracking-widest">查看完整精煉逐字稿</summary>
                        <div class="mt-6 text-base text-slate-400 leading-loose whitespace-pre-wrap font-medium">${seg.transcript}</div>
                    </details>
                </div>
            `).join('');
        }

        elements.copyLogBtn().onclick = async (e) => {
            e.preventDefault();
            const text = elements.debugConsole().innerText;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast("日誌已複製");
        };
    </script>
</body>
</html>
